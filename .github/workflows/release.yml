name: Release

# Builds the plug-and-play install archive for each supported platform
# and attaches them to a GitHub Release. Triggered by pushing a tag
# matching v*, or manually via workflow_dispatch against an existing tag.
#
# edda-driver unconditionally requests edda-compile's `llvm` feature
# (see crates/edda-driver/Cargo.toml), so every platform below needs a
# real LLVM 18 install with llvm-config reachable — there is no
# LLVM-free build of the actual `edda` binary. Per-platform LLVM
# provisioning:
#   - Linux: the official apt.llvm.org bootstrap script (llvm.sh),
#     which is the LLVM project's own recommended install path and
#     ships prebuilt packages (no from-source build).
#   - macOS: Homebrew's llvm@18 formula (also prebuilt).
#   - Windows: vcpkg, using the exact port feature set this repo's own
#     dev machine builds against (verified working locally — see
#     .cargo/config.toml's LLVM_SYS_180_PREFIX). GitHub-hosted
#     windows-latest runners ship vcpkg preinstalled at
#     $VCPKG_INSTALLATION_ROOT, but vcpkg's llvm port builds LLVM from
#     source — expect roughly an hour on a cold cache; the cache step
#     below makes every run after the first one fast.
#
# TODO (unverified — no CI runner available to test this against):
#   - None of the three LLVM provisioning steps below have run on a
#     real GitHub-hosted runner yet; package/formula names or vcpkg
#     behavior may need adjustment on first real run.
#   - The std/runes checkout step below targets edda-lang/edda (the
#     public monorepo). If that repo has no published content yet,
#     this job will fail until it is populated.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach release assets to"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: x86-64-windows-msvc
          - os: ubuntu-latest
            label: x86-64-linux-gnu
          - os: ubuntu-24.04-arm
            label: aarch64-linux-gnu
          - os: macos-14
            label: aarch64-macos-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout edda-bootstrap
        uses: actions/checkout@v4

      # TODO: unverified — depends on edda-lang/edda being published first.
      - name: Checkout std/runes monorepo
        uses: actions/checkout@v4
        with:
          repository: edda-lang/edda
          path: _edda-monorepo

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set CMake policy floor (vendored Z3 build)
        shell: bash
        run: echo "CMAKE_POLICY_VERSION_MINIMUM=3.5" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y llvm-18-dev libpolly-18-dev lld-18 zlib1g-dev libzstd-dev patchelf
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          echo "LLVM_SYS_180_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"

      # vcpkg ships preinstalled on windows-latest runners
      # ($VCPKG_INSTALLATION_ROOT). Its llvm port builds from source, so
      # this is the slow step on a cold cache; the cache step below
      # keys on the vcpkg commit + feature list so subsequent runs skip
      # straight to a cache hit instead of rebuilding LLVM.
      - name: Resolve vcpkg commit (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "VCPKG_COMMIT=$(git -C "$VCPKG_INSTALLATION_ROOT" rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache vcpkg LLVM build (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-llvm18-x64-windows-clang-default-targets-bindings-rtti-${{ env.VCPKG_COMMIT }}

      - name: Install LLVM 18 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          "$VCPKG_INSTALLATION_ROOT/vcpkg" install "llvm[clang,default-targets,enable-bindings,enable-rtti]:x64-windows"
          echo "LLVM_SYS_180_PREFIX=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> "$GITHUB_ENV"

      - name: Package release archive
        shell: bash
        env:
          EDDA_MONOREPO_ROOT: ${{ github.workspace }}/_edda-monorepo
        run: cargo xtask package

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: edda-bootstrap-${{ matrix.label }}
          path: |
            target/package/edda-bootstrap-${{ matrix.label }}.zip
            target/package/edda-bootstrap-${{ matrix.label }}.tar.gz
          if-no-files-found: ignore

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*/edda-bootstrap-*
          fail_on_unmatched_files: true
