name: Release

# Builds the plug-and-play install archive for Linux and macOS and attaches
# them to the GitHub Release. The Windows archive is produced from a local
# package build and uploaded directly, so it is intentionally not built here.
#
# Triggered by pushing a tag matching v*, or manually via workflow_dispatch
# with the target tag as input. In both cases the tag's source is checked out
# and built with this (current) workflow logic, and the resulting archives are
# attached to that tag's release.
#
# edda-driver unconditionally requests edda-compile's `llvm` feature, so each
# platform needs a real LLVM 18 install with llvm-config reachable:
#   - Linux: Ubuntu 24.04's own llvm-18-dev packages from the default repos.
#     The apt.llvm.org snapshot repo is intentionally NOT used: its llvm-18-dev
#     version string sorts older than noble's libllvm18, which `Breaks:` it,
#     producing "held broken packages" (apt exit 100).
#   - macOS: Homebrew's llvm@18 formula (prebuilt).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach release assets to"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: x86-64-linux-gnu
          - os: ubuntu-24.04-arm
            label: aarch64-linux-gnu
          - os: macos-14
            label: aarch64-macos-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout edda-bootstrap
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Checkout std/runes monorepo
        uses: actions/checkout@v4
        with:
          repository: edda-lang/edda
          path: _edda-monorepo

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set CMake policy floor (vendored Z3 build)
        shell: bash
        run: echo "CMAKE_POLICY_VERSION_MINIMUM=3.5" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev lld-18 zlib1g-dev libzstd-dev patchelf
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          echo "LLVM_SYS_180_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"

      - name: Package release archive
        shell: bash
        env:
          EDDA_MONOREPO_ROOT: ${{ github.workspace }}/_edda-monorepo
        run: cargo xtask package

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: edda-bootstrap-${{ matrix.label }}
          path: target/package/edda-bootstrap-${{ matrix.label }}.tar.gz
          if-no-files-found: ignore

  publish-release:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*/edda-bootstrap-*
          fail_on_unmatched_files: false
